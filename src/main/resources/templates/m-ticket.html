<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body {
            font-family: 'DejaVu Sans', sans-serif;
            background-color: #000;
            padding: 0;
            margin: 0;
        }

        .ticket-container { width: 330px; margin: 20px auto; background-color: #1a1a1a; border-radius: 15px; border: 1px solid #333; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .header { padding: 25px 10px; text-align: center; background: #111; border-bottom: 2px solid #e50914; }
        .brand { font-size: 26px; font-weight: 900; color: #fff; letter-spacing: 2px; text-transform: uppercase; }
        .premium-label { font-size: 8px; color: #e50914; letter-spacing: 4px; font-weight: bold; margin-top: 5px; }

        .main-info { padding: 20px; text-align: center; }
        .movie-name { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 10px; text-transform: capitalize; }

        .qr-section { background: #fff; padding: 6px; border-radius: 12px; display: inline-block; margin: 10px 0; border: 4px solid #1a1a1a; }

        .divider { border-top: 2px dashed #333; margin: 5px 0; width: 100%; }
        .venue-info { padding: 20px 20px 10px 20px; text-align: center; background-color: #151515; }

        .screen-type { font-size: 12px; color: #fff; margin-bottom: 8px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
        .seat-tag { color: white; font-weight: bold; margin-bottom: 12px; display: inline-block; font-size: 16px; letter-spacing: 1px; }
        .theater-name { font-size: 13px; color: #bbb; font-weight: bold; margin-bottom: 5px; }

        .footer-id { font-size: 12px; color: #ddd; padding: 12px 0; text-align: center; background-color: #111; letter-spacing: 1.5px; font-family: monospace; margin-top: 15px; border-radius: 8px; border: 1px dashed #333; }
    </style>
</head>
<body>
<div class="ticket-container">

    <div class="header">
        <div class="brand" th:text="${companyName}">CINEPASS</div>
        <div class="premium-label">DIGITAL EXPERIENCE</div>
    </div>

    <div class="main-info">
        <div class="movie-name" th:text="${movieTitle}">Movie Title</div>

        <div style="font-size: 14px; color: #fff; margin: 15px 0; background: #222; padding: 8px; border-radius: 5px;">
            <span th:text="${showDateTime}">Date and Time</span>
        </div>

        <div class="qr-section">
            <img th:src="'data:image/png;base64,' + ${qrCode}" width="200" height="200" />
        </div>

        <div class="divider"></div>
    </div>

    <div class="venue-info">
        <div class="screen-type" th:text="${screenName} + ' | ' + ${screenType}">Screen Details</div>

        <div class="seat-tag" th:text="${seats}">Seats</div>
        <div class="theater-name" th:text="${theaterName} + ', ' + ${theaterAddress} + ', ' + ${theaterCity}">Cinema Venue</div>

        <div class="footer-id" th:text="'Booking ID: ' + ${bookingId}">Booking ID</div>
    </div>
</div>
</body>
</html>
