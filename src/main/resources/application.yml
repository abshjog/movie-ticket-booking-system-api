spring:
  #Application Properties
  application:
    name: movie-ticket-booking-system-api

  #Datasource Properties
  datasource:
    url: "${MYSQL_URL:jdbc:mysql://localhost:3306/mdb?createDatabaseIfNotExist=true}"
    username: "${MYSQL_USERNAME:root}"
    password: "${MYSQL_PWD:root}"

    hikari:
      data-source-properties:
        serverTimezone: UTC

  #JPA Details
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
      jdbc:
        time_zone: UTC

# Internal Configuration
app:
  token:
    secret: "${TOKEN_SECRET:xEZeHOjDYg2qcL0T4Wll6vxyhChpCN8uvqLMhJ5Fi+8=}" #Only for testing and development mode
    access-duration: "${TOKEN_ACCESS_DURATION:5}" #in minutes
    refresh-duration: "${TOKEN_REFRESH_DURATION:1440}" #in minutes 24*60

#Context-path
server:
  servlet:
    context-path: /api/v1